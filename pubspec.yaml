name: frota_escolar_cda
description: Sistema de Monitoramento da Frota Escolar - Prefeitura de Conceição do Araguaia.
version: 1.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Navegação e Ícones
  cupertino_icons: ^1.0.6
  
  # [RF-002] Reconhecimento Facial e Câmera
  camera: ^0.11.0
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # [RF-001/RNF-003] Persistência Offline e Segurança
  sqflite: ^2.3.0
  sqlcipher_flutter_libs: ^0.6.0 # Para criptografia do SQLite [RNF-003]
  
  # [RF-004] Geolocalização e Trajeto
  geolocator: ^10.1.0
  
  # Interface e UX
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true